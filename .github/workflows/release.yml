name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o bin/zns-iscsi.exe ./cmd/zns-iscsi

      - name: Create archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="zns-iscsi_${TAG}_windows_amd64.zip"
          zip -j "${ARCHIVE}" bin/zns-iscsi.exe config.yaml.example
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
